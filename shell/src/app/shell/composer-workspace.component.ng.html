<div class="workspace-container" [class.extension-mode]="isExtension()">
  <div class="left-panel">
    <a2ui-composer-chat-panel></a2ui-composer-chat-panel>
  </div>
  <div class="right-panel">
    <div class="preview-section">
      <div class="preview-frame-container">
        <div class="frame-header">
          <span>Rendered A2UI Preview</span>
        </div>
        <div class="frame-body">
          <a2ui-composer-rendered-frame></a2ui-composer-rendered-frame>
        </div>
      </div>
      <div class="preview-frame-container">
        <div class="frame-header">
          <span>Raw A2UI JSON</span>
        </div>
        <div class="frame-body">
          <a2ui-composer-raw-frame></a2ui-composer-raw-frame>
        </div>
      </div>
    </div>
    <div class="debug-section" [class.collapsed]="isDebugCollapsed()">
      <div class="debug-header-controls">
        <button
          mat-icon-button
          (click)="clearAllLogs()"
          aria-label="Clear Logs"
          matTooltip="Clear all log tabs"
          matTooltipPosition="left"
        >
          <mat-icon>delete</mat-icon>
        </button>
        <button
          mat-icon-button
          (click)="toggleDebugCollapse()"
          aria-label="Toggle Debug Panel"
          [matTooltip]="isDebugCollapsed() ? 'Expand Debug Panel' : 'Collapse Debug Panel'"
          matTooltipPosition="left"
        >
          <mat-icon>{{
            isDebugCollapsed() ? 'keyboard_arrow_up' : 'keyboard_arrow_down'
          }}</mat-icon>
        </button>
      </div>
      <mat-tab-group fitInkBarToContent>
        <mat-tab label="Data Model">
          <div class="tab-content-container">
            <a2ui-composer-data-model></a2ui-composer-data-model>
          </div>
        </mat-tab>
        <mat-tab label="Events">
          <div class="tab-content-container">
            <a2ui-composer-events></a2ui-composer-events>
          </div>
        </mat-tab>
        <mat-tab label="Errors">
          <div class="tab-content-container">
            <a2ui-composer-errors></a2ui-composer-errors>
          </div>
        </mat-tab>
        <mat-tab label="Raw Messages">
          <div class="tab-content-container">
            <a2ui-composer-raw-messages></a2ui-composer-raw-messages>
          </div>
        </mat-tab>
        <mat-tab label="Mock Rules">
          <div class="tab-content-container">
            <a2ui-composer-mock-rules></a2ui-composer-mock-rules>
          </div>
        </mat-tab>
      </mat-tab-group>
    </div>
  </div>
</div>

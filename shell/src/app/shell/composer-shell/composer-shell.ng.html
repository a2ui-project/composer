<mat-toolbar class="composer-header">
  <span class="header-title" [matTooltip]="activeCatalogDescription() || ''"
    >A2UI Composer{{ activeCatalogTitle() ? ' - ' + activeCatalogTitle() : '' }}</span
  >
  <span class="spacer"></span>
  <button mat-button class="reset-session-button" color="primary" (click)="resetSession()">
    New Session
  </button>
  <button
    mat-icon-button
    (click)="openSettings()"
    class="settings-button"
    color="primary"
    aria-label="Settings"
  >
    <mat-icon aria-hidden="true">settings</mat-icon>
  </button>
  <button
    mat-icon-button
    class="theme-toggle-button"
    color="primary"
    (click)="toggleTheme()"
    [attr.aria-label]="isDarkTheme() ? 'Switch to light theme' : 'Switch to dark theme'"
  >
    <mat-icon aria-hidden="true">{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<div class="composer-content">
  <router-outlet></router-outlet>
</div>

<mat-toolbar class="composer-header">
  <button
    mat-icon-button
    class="hamburger-button"
    (click)="toggleCollapsed()"
    [attr.aria-expanded]="!isCollapsed()"
    aria-label="Toggle sidenav"
    aria-controls="composer-sidenav"
  >
    <mat-icon aria-hidden="true">menu</mat-icon>
  </button>
  <span class="header-title" [matTooltip]="activeCatalogDescription() || ''"
    >A2UI Composer{{ activeCatalogTitle() ? ' - ' + activeCatalogTitle() : '' }}</span
  >
  <span class="spacer"></span>
  <button mat-button class="reset-session-button" color="primary" (click)="resetSession()">
    New Session
  </button>
  <button
    mat-icon-button
    class="theme-toggle-button"
    color="primary"
    (click)="toggleTheme()"
    [attr.aria-label]="isDarkTheme() ? 'Switch to light theme' : 'Switch to dark theme'"
  >
    <mat-icon aria-hidden="true">{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="composer-sidenav-container">
  <mat-sidenav
    #sidenav
    id="composer-sidenav"
    mode="side"
    [opened]="true"
    class="composer-sidenav"
    [class.collapsed]="isCollapsed()"
  >
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active-nav-item"
        aria-label="Composer Workspace"
        matTooltip="Composer Workspace"
        matTooltipPosition="right"
        [routerLinkActiveOptions]="{exact: true}"
        [matTooltipDisabled]="!isCollapsed()"
        (click)="ensureCollapsed()"
      >
        <mat-icon matListItemIcon aria-hidden="true">construction</mat-icon>
        @if (!isCollapsed()) {
          <span class="nav-label">Composer Workspace</span>
        }
      </a>
      <a
        mat-list-item
        routerLink="/gallery"
        routerLinkActive="active-nav-item"
        aria-label="Components Gallery"
        matTooltip="Components Gallery"
        matTooltipPosition="right"
        [matTooltipDisabled]="!isCollapsed()"
        (click)="ensureCollapsed()"
      >
        <mat-icon matListItemIcon aria-hidden="true">widgets</mat-icon>
        @if (!isCollapsed()) {
          <span class="nav-label">Components Gallery</span>
        }
      </a>
      <a
        mat-list-item
        routerLink="/settings"
        routerLinkActive="active-nav-item"
        aria-label="Settings"
        matTooltip="Settings"
        matTooltipPosition="right"
        [matTooltipDisabled]="!isCollapsed()"
        (click)="ensureCollapsed()"
      >
        <mat-icon matListItemIcon aria-hidden="true">settings</mat-icon>
        @if (!isCollapsed()) {
          <span class="nav-label">Settings</span>
        }
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="composer-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>

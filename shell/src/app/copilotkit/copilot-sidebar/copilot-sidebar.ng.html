@if (collapsed()) {
  <div class="rail">
    <button
      mat-icon-button
      type="button"
      class="rail__toggle"
      aria-label="Expand assistant panel"
      (click)="toggleCollapsed()"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
} @else {
  <div class="header">
    <span class="header__title">Assistant</span>
    <button
      mat-icon-button
      type="button"
      class="header__toggle"
      aria-label="Collapse assistant panel"
      (click)="toggleCollapsed()"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>
  </div>
  <div class="chat">
    @if (hasKey()) {
      <copilot-chat agentId="default" />
    } @else {
      <div class="no-key">
        <mat-icon class="no-key__icon" aria-hidden="true">vpn_key</mat-icon>
        <p class="no-key__message">Add your Gemini API key to start generating.</p>
        <a mat-flat-button color="primary" routerLink="/settings" class="no-key__cta">
          Add Gemini API key
        </a>
      </div>
    }
  </div>
}

name: Deploy PR Previews

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      # Only compile prerequisite bridge dependency in baseline step
      - name: Build Core Bridge Dependency
        run: yarn workspace a2ui-bridge build

      - name: Build Shell & Catalogs with PR-Specific Base URLs
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          yarn workspace ng-basic-catalog run build --base-href=/composer/pr/${PR_NUM}/samples/ng-basic-catalog/
          yarn workspace a2ui-composer-shell run build --base-href=/composer/pr/${PR_NUM}/
          yarn workspace lit-basic-catalog run build --base=/composer/pr/${PR_NUM}/samples/lit-basic-catalog/
          yarn workspace react-basic-catalog run build --base=/composer/pr/${PR_NUM}/samples/react-basic-catalog/

      # Explicitly pre-create all destination directories and use cp -r SOURCE/. DEST/
      - name: Assemble Staging Directory (deploy_dist)
        run: |
          mkdir -p deploy_dist/samples/ng-basic-catalog
          mkdir -p deploy_dist/samples/lit-basic-catalog
          mkdir -p deploy_dist/samples/react-basic-catalog

          if [ -d "shell/dist/a2ui-composer/browser" ]; then
            cp -r shell/dist/a2ui-composer/browser/. deploy_dist/
          else
            cp -r shell/dist/a2ui-composer/. deploy_dist/
          fi

          if [ -d "samples/ng-basic-catalog/dist/ng-basic-catalog/browser" ]; then
            cp -r samples/ng-basic-catalog/dist/ng-basic-catalog/browser/. deploy_dist/samples/ng-basic-catalog/
          else
            cp -r samples/ng-basic-catalog/dist/ng-basic-catalog/. deploy_dist/samples/ng-basic-catalog/
          fi

          cp -r samples/lit-basic-catalog/dist/. deploy_dist/samples/lit-basic-catalog/
          cp -r samples/react-basic-catalog/dist/. deploy_dist/samples/react-basic-catalog/

          touch deploy_dist/.nojekyll

      - name: Publish Preview to gh-pages Subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_dist
          destination_dir: pr/${{ github.event.pull_request.number }}
          keep_files: true

      # Implement paginated github.paginate comment queries and non-blocking try..catch fault tolerance
      - name: Post PR Preview Comment
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const prNum = context.payload.pull_request.number;
              const repoName = context.repo.repo;
              const ownerName = context.repo.owner;
              const previewUrl = `https://${ownerName}.github.io/${repoName}/pr/${prNum}/`;
              const commentBody = `### ⚡ A2UI Composer PR Preview\n\nYour automated preview is successfully live:\n👉 **[Launch PR Preview](${previewUrl})**\n\n> *Note: This environment will be wiped automatically when the PR is merged or closed.*`;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: ownerName,
                repo: repoName,
                issue_number: prNum,
              });

              const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('A2UI Composer PR Preview'));
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: ownerName,
                  repo: repoName,
                  comment_id: botComment.id,
                  body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: ownerName,
                  repo: repoName,
                  issue_number: prNum,
                  body: commentBody,
                });
              }
            } catch (error) {
              console.warn('Failed to post or update PR preview comment:', error);
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete PR Preview Folder from gh-pages Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages

          # Safely check out the remote branch
          git checkout -B gh-pages origin/gh-pages

          PR_DIR="pr/${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git commit -m "Automated cleanup of PR #${{ github.event.pull_request.number }} preview"

            # Robust push with an exponential backoff and rebase loop to handle concurrent updates
            for i in {1..5}; do
              git pull origin gh-pages --rebase && git push origin gh-pages && break
              if [ $i -eq 5 ]; then
                echo "Failed to push cleanup after 5 merge conflict attempts."
                exit 1
              fi
              echo "Push conflict detected. Retrying in $((i*5)) seconds..."
              sleep $((i*5))
            done
          else
            echo "Preview directory $PR_DIR does not exist; no cleanup necessary."
          fi

      # Implement paginated github.paginate queries and non-blocking try..catch fault tolerance
      - name: Post Preview Demolition Comment
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const prNum = context.payload.pull_request.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
              });

              const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('A2UI Composer PR Preview'));
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: `### ⚡ A2UI Composer PR Preview\n\nThis Pull Request was closed. The preview environment at \`/pr/${prNum}/\` has been fully decommissioned.`,
                });
              }
            } catch (error) {
              console.warn('Failed to post preview demolition comment:', error);
            }

# ==============================================================================
# PR Preview Deploy (Stage 2)
#
# Purpose:
#   Stage 2 of the two-stage PR preview workflow.
#
# Architecture & Security:
#   Triggered by `workflow_run` upon successful completion of Stage 1 ("PR
#   Preview Build"). It runs in the privileged context of the default (`main`)
#   branch with `contents: write` and `pull-requests: write` permissions.
#
# Relationship to Stage 1:
#   Downloads the `pr-preview-payload` static artifact created by Stage 1,
#   deploys static files to `gh-pages` under `pr/${PR_NUM}`, and posts PR
#   comments. It never checks out or executes any code or build scripts from the
#   pull request.
# ==============================================================================

name: PR Preview Deploy

on:
  workflow_run:
    workflows: ["PR Preview Build"]
    types: [completed]

concurrency:
  group: gh-pages-deployment
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download PR Preview Artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-payload
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read & Validate PR Metadata
        run: |
          if [ ! -f pr_meta/metadata.json ]; then
            echo "Error: pr_meta/metadata.json missing from downloaded artifact."
            exit 1
          fi

          PR_NUM=$(jq -r '.pr_number // empty' pr_meta/metadata.json)
          ACTION=$(jq -r '.action // empty' pr_meta/metadata.json)
          HEAD_SHA=$(jq -r '.head_sha // empty' pr_meta/metadata.json)

          if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid PR_NUM '$PR_NUM'. Must be a positive integer matching ^[0-9]+$"
            exit 1
          fi

          echo "PR_NUM=${PR_NUM}" >> $GITHUB_ENV
          echo "ACTION=${ACTION}" >> $GITHUB_ENV
          echo "HEAD_SHA=${HEAD_SHA}" >> $GITHUB_ENV

      - name: Publish Preview to gh-pages Subfolder
        if: env.ACTION == 'opened' || env.ACTION == 'synchronize' || env.ACTION == 'reopened'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_dist
          destination_dir: pr/${{ env.PR_NUM }}
          keep_files: true

      - name: Post PR Preview Comment
        if: env.ACTION == 'opened' || env.ACTION == 'synchronize' || env.ACTION == 'reopened'
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ env.PR_NUM }}
        with:
          script: |
            try {
              const prNum = parseInt(process.env.PR_NUM, 10);
              const repoName = context.repo.repo;
              const ownerName = context.repo.owner;
              const previewUrl = `https://${ownerName}.github.io/${repoName}/pr/${prNum}/`;
              const commentBody = `### ⚡ A2UI Composer PR Preview\n\nYour automated preview is successfully live:\n👉 **[Launch PR Preview](${previewUrl})**\n\n> *Note: This environment will be wiped automatically when the PR is merged or closed.*`;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: ownerName,
                repo: repoName,
                issue_number: prNum,
              });

              const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('A2UI Composer PR Preview'));
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: ownerName,
                  repo: repoName,
                  comment_id: botComment.id,
                  body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: ownerName,
                  repo: repoName,
                  issue_number: prNum,
                  body: commentBody,
                });
              }
            } catch (error) {
              console.warn('Failed to post or update PR preview comment:', error);
            }

      - name: Delete PR Preview Folder from gh-pages Branch
        if: env.ACTION == 'closed'
        env:
          PR_NUM: ${{ env.PR_NUM }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          if ! git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            echo "Remote branch gh-pages does not exist yet; no cleanup necessary."
            exit 0
          fi

          # Safely check out the remote branch
          git checkout -B gh-pages origin/gh-pages

          PR_DIR="pr/${PR_NUM}"
          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git commit -m "Automated cleanup of PR #${PR_NUM} preview"

            # Robust push with an exponential backoff and rebase loop to handle concurrent updates
            for i in {1..5}; do
              if git pull origin gh-pages --rebase && git push origin gh-pages; then
                break
              fi
              git rebase --abort 2>/dev/null || true
              if [ $i -eq 5 ]; then
                echo "Failed to push cleanup after 5 merge conflict attempts."
                exit 1
              fi
              echo "Push conflict detected. Retrying in $((i*5)) seconds..."
              sleep $((i*5))
            done
          else
            echo "Preview directory $PR_DIR does not exist; no cleanup necessary."
          fi

      - name: Post Preview Demolition Comment
        if: env.ACTION == 'closed'
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ env.PR_NUM }}
        with:
          script: |
            try {
              const prNum = parseInt(process.env.PR_NUM, 10);
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
              });

              const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('A2UI Composer PR Preview'));
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: `### ⚡ A2UI Composer PR Preview\n\nThis Pull Request was closed. The preview environment at \`/pr/${prNum}/\` has been fully decommissioned.`,
                });
              }
            } catch (error) {
              console.warn('Failed to post preview demolition comment:', error);
            }
